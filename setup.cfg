[flake8]
application-import-names =
    cutanix,
    bot,
    api,
    users,
    analysis,
    payments,
    webapp
import-order-style = google
max-line-length = 79
inline-quotes = double
ignore = E203, W503
exclude =
    .git,
    __pycache__,
    migrations,
    tests/*,
    docs/*,
    */venv/,
    .venv/,
    frontend/,
    for_docker/
