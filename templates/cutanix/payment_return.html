<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cutanix — Оплата</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111118; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { max-width: 380px; width: 100%; padding: 32px 24px; text-align: center; }
    .icon { width: 72px; height: 72px; margin: 0 auto 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .icon-success { background: rgba(0,255,136,.12); border: 2px solid rgba(0,255,136,.3); }
    .icon-pending { background: rgba(251,191,36,.12); border: 2px solid rgba(251,191,36,.3); }
    .icon-fail { background: rgba(239,68,68,.12); border: 2px solid rgba(239,68,68,.3); }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    p { color: #9ca3af; font-size: 14px; line-height: 1.5; margin-bottom: 24px; }
    .btn { display: inline-block; padding: 14px 28px; border-radius: 10px; font-size: 15px; font-weight: 600; text-decoration: none; cursor: pointer; border: none; transition: opacity .2s; }
    .btn:hover { opacity: .85; }
    .btn-primary { background: #00ff88; color: #0a0a0f; }
    .info { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); border-radius: 10px; padding: 16px; margin-bottom: 24px; text-align: left; }
    .info-row { display: flex; justify-content: space-between; font-size: 13px; padding: 6px 0; }
    .info-label { color: #6b7280; }
    .info-value { color: #e0e0e0; font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon icon-pending" id="status-icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2" class="spin"><circle cx="12" cy="12" r="10" stroke-dasharray="60" stroke-dashoffset="15" stroke-linecap="round"/></svg>
    </div>

    <h1 id="status-title" style="color:#fbbf24">Проверяем оплату...</h1>
    <p id="status-text">Не закрывайте эту страницу.</p>

    <div class="info">
      <div class="info-row"><span class="info-label">Тариф</span><span class="info-value">{{ plan_name }}</span></div>
      <div class="info-row"><span class="info-label">Сумма</span><span class="info-value">{{ amount_rub }} ₽</span></div>
      <div class="info-row"><span class="info-label">Статус</span><span class="info-value" id="status-label">Проверяем...</span></div>
    </div>
  </div>

  <script>
    var paymentId = '{{ payment_id }}';
    var planName = '{{ plan_name }}';
    var token = new URLSearchParams(window.location.search).get('token');
    var attempts = 0;

    function updateUI(status) {
      var icon = document.getElementById('status-icon');
      var title = document.getElementById('status-title');
      var text = document.getElementById('status-text');
      var label = document.getElementById('status-label');

      if (status === 'succeeded') {
        icon.className = 'icon icon-success';
        icon.innerHTML = '<svg width="36" height="36" fill="none" stroke="#00ff88" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>';
        title.textContent = 'Оплата прошла!';
        title.style.color = '#00ff88';
        text.textContent = 'Подписка ' + planName + ' активирована. Можете закрыть вкладку.';
        label.textContent = 'Оплачено';
        label.style.color = '#00ff88';
        clearInterval(pollTimer);
      } else if (status === 'failed' || status === 'cancelled') {
        icon.className = 'icon icon-fail';
        icon.innerHTML = '<svg width="36" height="36" fill="none" stroke="#ef4444" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>';
        title.textContent = 'Оплата не прошла';
        title.style.color = '#ef4444';
        text.textContent = 'Попробуйте другой способ оплаты в приложении.';
        label.textContent = 'Ошибка';
        label.style.color = '#ef4444';
        clearInterval(pollTimer);
      } else {
        icon.className = 'icon icon-pending';
        icon.innerHTML = '<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2" class="spin"><circle cx="12" cy="12" r="10" stroke-dasharray="60" stroke-dashoffset="15" stroke-linecap="round"/></svg>';
        title.textContent = 'Проверяем оплату...';
        title.style.color = '#fbbf24';
        text.textContent = 'Не закрывайте эту страницу.';
        label.textContent = 'Ожидает подтверждения';
        label.style.color = '#fbbf24';
      }
    }

    async function poll() {
      try {
        var r = await fetch('/api/payment/public-status/' + paymentId + '/?token=' + encodeURIComponent(token));
        var data = await r.json();
        if (data && data.status) {
          updateUI(data.status);
        }
      } catch(e) {}
      attempts++;
      if (attempts < 300) {
        setTimeout(poll, 2000);
      }
    }

    poll();
  </script>

  <style>
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .spin { animation: spin 1s linear infinite; }
  </style>
</body>
</html>
