<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Cutanix — проверьте безопасность косметики по составу (INCI) или фото этикетки" />
  <title>Cutanix</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  {% load static %}
  <link rel="stylesheet" href="{% static 'cutanix/css/style.css' %}">
</head>
<body class="bg-[#111118] text-white">
  <div id="app">
    <div id="loading" class="flex flex-col items-center justify-center min-h-screen">
      <svg width="40" height="40" viewBox="0 0 40 40" class="animate-spin">
        <circle cx="20" cy="20" r="16" fill="none" stroke="#00ff88" stroke-width="3" stroke-dasharray="80" stroke-dashoffset="60" stroke-linecap="round"/>
      </svg>
      <div class="text-[#00ff88] text-lg mt-3 font-sans">Cutanix</div>
    </div>
  </div>

  <script src="{% static 'cutanix/js/app.js' %}"></script>
</body>
</html>
