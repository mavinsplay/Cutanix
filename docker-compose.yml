version: "3.8"

services:
  postgres:
    image: postgres:17
    container_name: cutanix_postgres
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./for_docker/postgres_data:/var/lib/postgresql/data
    restart: always
    networks:
      - cutanix_net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    container_name: cutanix_redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    env_file: .env
    volumes:
      - ./for_docker/redis_data:/data
    restart: always
    networks:
      - cutanix_net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  django:
    build: .
    container_name: cutanix_django
    env_file: .env
    volumes:
      - ./logs/django:/logs
      - ./media:/media
      - ./frontend/dist:/frontend:ro
    depends_on:
      - postgres
      - redis
    restart: always
    networks:
      - cutanix_net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  celery:
    build: .
    container_name: cutanix_celery
    env_file: .env
    command: celery -A cutanix worker --loglevel=INFO --logfile=/logs/celery.log
    volumes:
      - ./logs/celery:/logs
      - ./media:/media
    depends_on:
      - redis
      - postgres
      - django
    restart: always
    networks:
      - cutanix_net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  bot:
    build: .
    container_name: cutanix_bot
    env_file: .env
    command: python manage.py runbot
    depends_on:
      - django
      - postgres
      - redis
    restart: always
    networks:
      - cutanix_net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  nginx:
    image: nginx:latest
    container_name: cutanix_nginx
    ports:
      - "8000:8000"
    volumes:
      - ./for_docker/nginx-confs/cutanix_dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/static:ro
      - ./media:/media:ro
      - ./frontend/dist:/frontend:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - django
    restart: always
    networks:
      - cutanix_net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

networks:
  cutanix_net:
    driver: bridge
