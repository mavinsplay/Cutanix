name: "cutanix"

services:
  postgres:
    image: postgres:17
    container_name: cutanix_postgres
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./for_docker/postgres_data:/var/lib/postgresql/data
    restart: always
    networks:
      - cutanix_net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    container_name: cutanix_redis
    env_file: .env
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_PASSWORD}"
      - "--save"
      - "60"
      - "1"
    volumes:
      - ./for_docker/redis_data:/data
    restart: always
    networks:
      - cutanix_net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  django:
    build:
      context: .
      args:
        REQUIREMENTS: ${REQUIREMENTS:-dev.txt}
    container_name: cutanix_django
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    restart: always
    volumes:
      - ./static:/static
      - ./media:/media
      - ./logs/django:/logs
    depends_on:
      - postgres
      - redis
    profiles:
      - dev
      - prod
    networks:
      - cutanix_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  celery:
    build:
      context: .
      args:
        REQUIREMENTS: ${REQUIREMENTS:-dev.txt}
    container_name: cutanix_celery
    env_file: .env
    command: celery -A cutanix worker --loglevel=INFO --logfile=/logs/celery.log
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    restart: always
    volumes:
      - ./media:/media
      - ./logs/celery:/logs
    depends_on:
      - postgres
      - redis
    profiles:
      - dev
      - prod
    networks:
      - cutanix_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  bot:
    build:
      context: .
      args:
        REQUIREMENTS: ${REQUIREMENTS:-dev.txt}
    container_name: cutanix_bot
    env_file: .env
    command: python manage.py runbot
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    restart: always
    depends_on:
      - postgres
      - redis
    profiles:
      - dev
      - prod
    networks:
      - cutanix_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  nginx-dev:
    image: nginx:1.27-alpine
    container_name: cutanix_nginx_dev
    profiles: ["dev"]
    ports:
      - "8000:8000"
    volumes:
      - ./for_docker/nginx-confs/cutanix_dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/static:ro
      - ./media:/media:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - django
    restart: always
    networks:
      - cutanix_net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  nginx-prod:
    image: jonasal/nginx-certbot:latest
    container_name: cutanix_nginx_prod
    profiles: ["prod"]
    env_file: .env
    environment:
      - NGINX_MAX_BODY_SIZE=50G
      - STAGING=${CERTBOT_STAGING:-0}
      - CERTBOT_EMAIL=${CERTBOT_EMAIL}
      - CUTANIX_DOMAIN=${CUTANIX_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./for_docker/nginx-entrypoint.sh:/docker-entrypoint-wrapper.sh:ro
      - ./for_docker/nginx-confs/cutanix_prod.conf.template:/etc/nginx/conf-template/cutanix_prod.conf.template:ro
      - ./static:/static:ro
      - ./media:/media:ro
      - ./for_docker/nginx-body:/var/lib/nginx/body:rw
      - ./for_docker/letsencrypt_webroot:/var/www/letsencrypt:rw
      - ./logs/nginx:/var/log/nginx
      - ./for_docker/nginx_certificates:/etc/letsencrypt
    entrypoint: ["sh", "/docker-entrypoint-wrapper.sh"]
    depends_on:
      - django
    restart: always
    networks:
      - cutanix_net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

networks:
  cutanix_net:
    driver: bridge
