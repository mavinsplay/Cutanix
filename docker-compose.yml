x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

services:
  postgres:
    image: postgres:17
    container_name: cutanix_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./for_docker/postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [cutanix_net]
    logging: *default-logging
    profiles: ["dev", "prod"]

  redis:
    image: redis:7-alpine
    container_name: cutanix_redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-cutanix_redis_pass}
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_PASSWORD:-cutanix_redis_pass}"
      - "--save"
      - "60"
      - "1"
    volumes:
      - ./for_docker/redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD:-cutanix_redis_pass}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks: [cutanix_net]
    logging: *default-logging
    profiles: ["dev", "prod"]

  celery:
    build:
      context: .
      args:
        REQUIREMENTS: dev.txt
    image: cutanix_celery:latest
    container_name: cutanix_celery
    env_file: .env
    command: celery -A cutanix worker --loglevel=INFO --logfile=/logs/celery.log
    environment:
      DJANGO_SELECTED_DB: postgresql
      DJANGO_USE_REDIS: "true"
      CELERY_ALWAYS_EAGER: "false"
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-cutanix_redis_pass}
    volumes:
      - ./media:/media
      - ./logs/celery:/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks: [cutanix_net]
    logging: *default-logging
    profiles: ["dev"]

  celery_prod:
    build:
      context: .
      args:
        REQUIREMENTS: prod.txt
    image: cutanix_celery:latest
    container_name: cutanix_celery
    env_file: .env
    command: celery -A cutanix worker --loglevel=INFO --logfile=/logs/celery.log
    environment:
      DJANGO_SELECTED_DB: postgresql
      DJANGO_USE_REDIS: "true"
      CELERY_ALWAYS_EAGER: "false"
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-cutanix_redis_pass}
    volumes:
      - ./media:/media
      - ./logs/celery:/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks: [cutanix_net]
    logging: *default-logging
    profiles: ["prod"]

  bot:
    build:
      context: .
      args:
        REQUIREMENTS: dev.txt
    image: cutanix_bot:latest
    container_name: cutanix_bot
    env_file: .env
    command: python manage.py runbot
    environment:
      DJANGO_SELECTED_DB: postgresql
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-cutanix_redis_pass}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks: [cutanix_net]
    logging: *default-logging
    profiles: ["dev"]

  bot_prod:
    build:
      context: .
      args:
        REQUIREMENTS: prod.txt
    image: cutanix_bot:latest
    container_name: cutanix_bot
    env_file: .env
    command: python manage.py runbot
    environment:
      DJANGO_SELECTED_DB: postgresql
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-cutanix_redis_pass}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks: [cutanix_net]
    logging: *default-logging
    profiles: ["prod"]

  django:
    build:
      context: .
      args:
        REQUIREMENTS: dev.txt
    image: cutanix_app:latest
    container_name: cutanix_django
    env_file: .env
    environment:
      DJANGO_DEBUG: "true"
      DJANGO_SELECTED_DB: postgresql
      DJANGO_USE_REDIS: "true"
      CELERY_ALWAYS_EAGER: "false"
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-cutanix_redis_pass}
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      DJANGO_CSRF_TRUSTED_ORIGINS: "http://localhost,http://127.0.0.1"
      DJANGO_SITE_URL: "http://localhost:8000"
    volumes:
      - ./static:/static
      - ./media:/media
      - ./logs/django:/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks: [cutanix_net]
    logging: *default-logging
    profiles: ["dev"]

  django_prod:
    build:
      context: .
      args:
        REQUIREMENTS: prod.txt
    image: cutanix_app:latest
    container_name: cutanix_django
    env_file: .env
    environment:
      DJANGO_DEBUG: "false"
      DJANGO_SELECTED_DB: postgresql
      DJANGO_USE_REDIS: "true"
      CELERY_ALWAYS_EAGER: "false"
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-cutanix_redis_pass}
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-yourdomain.com,www.yourdomain.com}"
      DJANGO_CSRF_TRUSTED_ORIGINS: "${DJANGO_CSRF_TRUSTED_ORIGINS:-https://yourdomain.com}"
      DJANGO_SITE_URL: "${DJANGO_SITE_URL:-https://yourdomain.com}"
    volumes:
      - ./static:/static
      - ./media:/media
      - ./logs/django:/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks: [cutanix_net]
    logging: *default-logging
    profiles: ["prod"]

  # ---------- Nginx (dev) ----------
  nginx:
    image: nginx:1.27-alpine
    container_name: cutanix_nginx
    ports:
      - "8000:8000"
    volumes:
      - ./for_docker/nginx-confs/cutanix_dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/static:ro
      - ./media:/media:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - django
    restart: always
    networks: [cutanix_net]
    logging: *default-logging
    profiles: ["dev"]

  # ---------- Nginx (prod) + авто-сертификаты certbot ----------
  # Домен берётся из CUTANIX_DOMAIN в .env; конфиг рендерится из шаблона
  # envsubst'ом при старте (см. for_docker/nginx-entrypoint.sh).
  nginx_prod:
    image: jonasal/nginx-certbot:latest
    container_name: cutanix_nginx
    profiles: ["prod"]
    env_file: .env
    environment:
      - NGINX_MAX_BODY_SIZE=50G
      - STAGING=${CERTBOT_STAGING:-0}
      - CERTBOT_EMAIL=${CERTBOT_EMAIL}
      - CUTANIX_DOMAIN=${CUTANIX_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./for_docker/nginx-entrypoint.sh:/docker-entrypoint-wrapper.sh:ro
      - ./for_docker/nginx-confs/cutanix_prod.conf.template:/etc/nginx/conf-template/cutanix_prod.conf.template:ro
      - ./static:/static:ro
      - ./media:/media:ro
      - ./for_docker/nginx-body:/var/lib/nginx/body:rw
      - ./for_docker/letsencrypt_webroot:/var/www/letsencrypt:rw
      - ./logs/nginx:/var/log/nginx
      - ./for_docker/nginx_certificates:/etc/letsencrypt
    entrypoint: ["sh", "/docker-entrypoint-wrapper.sh"]
    depends_on:
      - django_prod
    restart: always
    networks: [cutanix_net]
    logging: *default-logging

networks:
  cutanix_net:
    driver: bridge
